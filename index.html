<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayJucs Game Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="space-bg"></div>

    <header>
        <h1>PlayJucs Hub</h1>
        <p>Your Portal to Cosmic Gaming</p>
    </header>

    <div class="container">
        
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All Games</button>
            <button class="filter-btn" data-filter="action">Action</button>
            <button class="filter-btn" data-filter="retro">Retro</button>
            <button class="filter-btn" data-filter="strategy">Strategy</button>
        </div>

        <main class="games-grid" id="gamesGrid">
            
            <a href="#" class="game-card" data-category="action">
                <div class="game-thumb">🚀</div>
                <div class="game-info">
                    <div class="game-title">Space Shooter</div>
                    <div class="game-tags">
                        <span class="tag">Action</span>
                    </div>
                </div>
            </a>

            <a href="#" class="game-card" data-category="retro">
                <div class="game-thumb">👾</div>
                <div class="game-info">
                    <div class="game-title">Retro Invaders</div>
                    <div class="game-tags">
                        <span class="tag">Retro</span>
                    </div>
                </div>
            </a>

            <a href="#" class="game-card" data-category="strategy">
                <div class="game-thumb">🧩</div>
                <div class="game-info">
                    <div class="game-title">Cosmic Blocks</div>
                    <div class="game-tags">
                        <span class="tag">Strategy</span>
                    </div>
                </div>
            </a>

            <a href="#" class="game-card" data-category="action">
                <div class="game-thumb">🏎️</div>
                <div class="game-info">
                    <div class="game-title">Nebula Drift</div>
                    <div class="game-tags">
                        <span class="tag">Action</span>
                    </div>
                </div>
            </a>

            <a href="#" class="game-card" data-category="retro">
                <div class="game-thumb">🎰</div>
                <div class="game-info">
                    <div class="game-title">Galactic Quest</div>
                    <div class="game-tags">
                        <span class="tag">Retro</span>
                    </div>
                </div>
            </a>

            <a href="#" class="game-card" data-category="strategy">
                <div class="game-thumb">♟️</div>
                <div class="game-info">
                    <div class="game-title">Cosmic Chess</div>
                    <div class="game-tags">
                        <span class="tag">Strategy</span>
                    </div>
                </div>
            </a>

        </main>
    </div>

    <footer>
        <p>&copy; 2026 PlayJucs Game Hub. Built for the galaxy.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
